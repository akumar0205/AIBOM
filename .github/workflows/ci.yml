name: CI
on:
  pull_request:
  push:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      LICENSE_POLICY_DENY: "GPL;LGPL;AGPL"
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.3.0
        with:
          python-version: "3.11"

      - name: Install pinned build tooling
        run: python -m pip install --upgrade pip

      - name: Guard lockfile refresh
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "No comparable base SHA available; skipping lockfile freshness guard."
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA")"
          if echo "$CHANGED_FILES" | rg -q '^(pyproject\.toml|requirements-dev\.in)$'; then
            if ! echo "$CHANGED_FILES" | rg -q '^requirements\.lock$'; then
              echo "requirements.lock must be updated whenever pyproject.toml or requirements-dev.in changes."
              exit 1
            fi
          fi

      - name: Install hash-locked dependencies
        run: pip install --require-hashes -r requirements.lock

      - name: Install package without dependency resolution
        run: pip install --no-deps -e .

      - name: Lint
        run: ruff check .

      - name: Format check
        run: black --check .

      - name: Unit tests
        run: pytest -q

      - name: Vulnerability audit (fail on any finding)
        run: pip-audit -r requirements.lock --strict

      - name: License policy audit (fail on copyleft/unknown)
        run: |
          pip-licenses --from=mixed --allow-only "MIT License;BSD License;Apache Software License;Python Software Foundation License;ISC License;Mozilla Public License 2.0 (MPL 2.0)" --fail-on "$LICENSE_POLICY_DENY"

      - name: Create ephemeral signing cert
        run: |
          openssl req -x509 -newkey rsa:2048 -keyout signing.key -out signing.crt -days 1 -nodes -subj "/CN=aibom-ci"

      - name: Generate evidence bundle
        run: aibom generate . --audit-mode --bundle-out evidence.zip

      - name: Sign evidence bundle
        run: aibom attest --bundle evidence.zip --signing-key signing.key --signing-cert signing.crt --signature evidence.zip.sig --provenance provenance.json

      - name: Verify evidence bundle signature
        run: aibom attest --bundle evidence.zip --signature evidence.zip.sig --provenance provenance.json --signing-cert signing.crt --verify
